# ipsec-profiles.conf — v1.0.2
# Centralized vendor interop profiles used by gwctl + tenant build.
#
# Supported profiles:
#   strongswan | cisco | arista
#
# Variables per profile:
#   PROFILE_<p>_IKE_PROPOSALS
#   PROFILE_<p>_ESP_PROPOSALS
#   PROFILE_<p>_IKE_LIFETIME
#   PROFILE_<p>_ESP_LIFETIME
#   PROFILE_<p>_DPD_DELAY
#   PROFILE_<p>_DPD_TIMEOUT
#   PROFILE_<p>_FRAG
#   PROFILE_<p>_FORCE_ENCAP
#   PROFILE_<p>_MSS_CLAMP

PROFILE_strongswan_IKE_PROPOSALS="aes256-sha256-modp2048,aes128-sha256-modp2048"
PROFILE_strongswan_ESP_PROPOSALS="aes256-sha256,aes128-sha256"
PROFILE_strongswan_IKE_LIFETIME="8h"
PROFILE_strongswan_ESP_LIFETIME="1h"
PROFILE_strongswan_DPD_DELAY="30s"
PROFILE_strongswan_DPD_TIMEOUT="120s"
PROFILE_strongswan_FRAG="yes"
PROFILE_strongswan_FORCE_ENCAP="no"
PROFILE_strongswan_MSS_CLAMP="1360"

PROFILE_cisco_IKE_PROPOSALS="aes256-sha256-modp2048,aes128-sha256-modp2048"
PROFILE_cisco_ESP_PROPOSALS="aes256-sha256,aes128-sha256"
PROFILE_cisco_IKE_LIFETIME="8h"
PROFILE_cisco_ESP_LIFETIME="1h"
PROFILE_cisco_DPD_DELAY="10s"
PROFILE_cisco_DPD_TIMEOUT="60s"
PROFILE_cisco_FRAG="yes"
PROFILE_cisco_FORCE_ENCAP="no"
PROFILE_cisco_MSS_CLAMP="1360"

PROFILE_arista_IKE_PROPOSALS="aes256-sha256-modp2048,aes128-sha256-modp2048"
PROFILE_arista_ESP_PROPOSALS="aes256-sha256,aes128-sha256"
PROFILE_arista_IKE_LIFETIME="8h"
PROFILE_arista_ESP_LIFETIME="1h"
PROFILE_arista_DPD_DELAY="10s"
PROFILE_arista_DPD_TIMEOUT="60s"
PROFILE_arista_FRAG="yes"
PROFILE_arista_FORCE_ENCAP="no"
PROFILE_arista_MSS_CLAMP="1360"
