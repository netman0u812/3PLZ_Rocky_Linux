# /opt/gw-builder/gw.conf
# Gateway Builder Configuration (Rocky Linux 9)
# v0.4.2

WAN_IF=""
LAN_IF=""

TENANT_NET_BASE_CIDR="172.16.100.0/24"          # tenant #1 base; script increments 3rd octet
VTI_POOL_CIDR="192.168.248.0/21"
IKE_LOOPBACK_POOL_CIDR="192.168.1.0/24"
EGRESS_ID_POOL_CIDR="192.168.2.0/24"

TENANT_CORE_VETH_POOL_CIDR="192.168.10.0/21"
CORE_DEFAULT_VETH_NET="192.168.20.0/30"

STATE_DIR="/etc/gateway"
TENANTS_DIR="/etc/gateway/tenants.d"
TENANT_INDEX_FILE="/etc/gateway/tenant-index.map"

APPS_DIR="/etc/gateway/apps"                    # per-tenant app state

CATALOG_DIR="/etc/gateway/catalog"
LOG_DIR="/var/log/gw-builder"
FRR_SNIPPETS_DIR="/etc/frr/vrf-snippets"

SQUID_INST_DIR="/etc/squid/instances"
SQUID_TENANT_DIR="/etc/squid/tenants"

UNBOUND_TENANT_DIR="/etc/unbound/tenants"

ENVOY_TENANT_DIR="/etc/envoy/tenants"

NFT_MAIN="/etc/nftables.conf"
NFT_DIR="/etc/nftables.d"

PKI_DIR="/etc/gateway/pki"
TLS_DIR="/etc/gateway/tls"

VRF_TABLE_BASE=10000
FWMARK_BASE_DEC=256          # 0x100

CORE_VRF_NAME="vrf-core"
CORE_VRF_TABLE=20000

IPSEC_CONF="/etc/ipsec.conf"
IPSEC_SECRETS="/etc/ipsec.secrets"
UPDOWN_SCRIPT="/usr/local/sbin/ipsec-vti-updown.sh"

LOCAL_ASN=65001
REMOTE_ASN=65050
BGP_HOLDTIME="30"
BGP_KEEPTIME="10"

# Default policy prompts
DEFAULT_FW_MODE="permit-all"          # permit-all|enforced
DEFAULT_SQUID_MODE="explicit"         # explicit|transparent|both
DEFAULT_REVPROXY_INSPECT="on"         # on|off
DEFAULT_TAP_MODE="logs"               # logs|tap  (tap requires collector later)

# DNS defaults
DEFAULT_FORWARD_ZONE="outlan.net."
DEFAULT_FORWARD_ADDR="12.1.2.1"

# Default vendor interop profile for new tenants: strongswan | cisco | arista
IPSEC_PROFILE_DEFAULT=strongswan
